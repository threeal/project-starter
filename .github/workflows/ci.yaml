# Add more jobs here or create additional workflow files in this directory.

name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6.0.2

      - name: Check formatting
        uses: dprint/check@v2.3
